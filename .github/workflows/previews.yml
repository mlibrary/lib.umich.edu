#  Name of workflow
name: Previews workflow

# When workflow is triggered
on: 
  pull_request:
        
# Jobs to carry out
jobs:
  build:
    # Operating system to run job on
    runs-on: ubuntu-latest
    # Permissions for the GITHUB_TOKEN and LouisBrunner/checks-action
    permissions:
      issues: write
      checks: write
    # Stops previous workflow runs in the event of multiple pushes to a PR
    concurrency:
      group: previews-group
      cancel-in-progress: true
    # Environment to run job on
    environment: previews
    # Environment variables
    env:
      DRUPAL_CONCURRENT_FILE_REQUESTS: 20
      DRUPAL_REQUEST_TIMEOUT: 6000000
      DRUPAL_URL: ${{ vars.DRUPAL_URL }}
    # Steps in job
    steps:
      # Get code from repo
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Install NodeJS
      - name: Install latest LTS version of Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          check-latest: true
      # Run npm ci (clean-install) and build on our code
      - run: npm ci
      - run: npm run build
      # Deploy to Netlify using our production secrets
      - name: Deploy to netlify
        run: |
          DEPLOY_OUTPUT=$(npx netlify-cli deploy --dir=dist --alias deploy-preview-${{ github.event.number }} --json)
          DEPLOY_URL=$(printf '%s' "$DEPLOY_OUTPUT" | node -e "let s=''; process.stdin.on('data', d => s += d); process.stdin.on('end', () => { const data = JSON.parse(s); console.log(data.deploy_url || data.url || ''); });")
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}
      - name: Output summary
        run: echo $DEPLOY_URL >> $GITHUB_STEP_SUMMARY
      - uses: LouisBrunner/checks-action@6b626ffbad7cc56fd58627f774b9067e6118af23 # v2.0.0
        if: always()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Deploy Preview Link
          conclusion: ${{ job.status }}
          output: |
            {"summary":"${{ env.DEPLOY_URL }}" }
